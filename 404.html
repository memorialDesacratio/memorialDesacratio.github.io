<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f0f0f8" media="(prefers-color-scheme: light)">
    <meta name="color-scheme" content="dark light">
    <title>404 — CyberDesacratio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f;
            --text: #e0e0e0;
            --text-muted: #999;
            --accent: #8b5cf6;
            --accent2: #6d28d9;
            --border: rgba(255,255,255,0.06);
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f0f0f8;
                --text: #1a1a2e;
                --text-muted: #555;
                --border: rgba(0,0,0,0.08);
            }
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 500px;
            animation: fadeInUp 0.6s ease;
        }
        .error-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(5rem, 15vw, 8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }
        .terminal-line {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .terminal-line .highlight {
            color: var(--accent);
            -webkit-text-fill-color: var(--accent);
        }
        .blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 12px;
        }
        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139,92,246,0.4);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <div class="error-code">404</div>
        <div class="terminal-line">
            <span class="highlight">$</span> curl -I {{host}}<span class="blink">_</span>
            <br>
            <span class="highlight">→</span> HTTP/1.1 <span class="highlight">404 Not Found</span>
        </div>
        <h1>Ресурс не найден</h1>
        <p>Страница, которую ты ищешь, была перемещена, удалена или никогда не существовала. Возможно, опечатка в адресе?</p>
        <a href="/" class="btn">← На главную</a>
    </div>
</body>
</html>
